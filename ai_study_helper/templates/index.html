<!DOCTYPE html>
<html>
<head>
  <title>Study Helper</title>

  <!-- CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<header class="header">
  <h2>🎓 AI Study Helper</h2>
</header>

<main class="chat-container">
  <div id="chat-box" class="chat-box">
    <div class="bot-msg">Hello! I am your AI Study Helper.</div>
  </div>

<div id="loading" style="display:none; color:gray;">
    🤖 Thinking...
</div>

<div id="response"></div>

 <div class="mode-buttons">
  <button onclick="askWithMode('Explain')">Explain</button>
  <button onclick="askWithMode('Example')">Example</button>
  <button onclick="askWithMode('Summary')">Summary</button>
</div>

  <div class="input-area">
    <input id="question" placeholder="Ask your question..." />
    <button onclick="sendQuestion()">➤</button>
  </div>
</main>

<!-- JS -->
<script src="{{ url_for('static', filename='script.js') }}"></script>
<script>
function sendRequest(type) {
    let userInput = document.getElementById("userInput").value;

    // 👉 Show thinking
    document.getElementById("loading").style.display = "block";
    document.getElementById("response").innerHTML = "";

    fetch('/' + type, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question: userInput })
    })
    .then(res => res.json())
    .then(data => {
        // 👉 Hide thinking
        document.getElementById("loading").style.display = "none";

        // 👉 Show answer (typing effect)
        typeText(data.reply, "response");
    });
}


// ✨ Typing effect
function typeText(text, elementId) {
    let i = 0;
    let element = document.getElementById(elementId);

    function typing() {
        if (i < text.length) {
            element.innerHTML += text.charAt(i);
            i++;
            setTimeout(typing, 15);
        }
    }
    typing();
}
</script>
<script>
let messages = ["🤔 Thinking...", "🔍 Analyzing...", "🧠 Generating..."];
let index = 0;

setInterval(() => {
    let loading = document.getElementById("loading");
    if (loading.style.display === "block") {
        loading.innerText = messages[index];
        index = (index + 1) % messages.length;
    }
}, 800);
</script>


</body>
</html>
